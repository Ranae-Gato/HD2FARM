# This workflow integrates SecurityCodeScan with GitHub's Code Scanning feature
name: SecurityCodeScan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '25 20 * * 5'

jobs:
  SCS:
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: nuget/setup-nuget@04b0c2b8d1b97922f67eca497d7cf0bf17b8ffe1
      - uses: microsoft/setup-msbuild@v1.0.2

      - name: Detect .NET projects
        id: detect
        shell: pwsh
        run: |
          $files = git ls-files '*.sln' '*.csproj'
          if ($files) {
            echo "has_proj=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "has_proj=false" >> $env:GITHUB_OUTPUT
          }

      - name: (debug) Show repository layout
        if: steps.detect.outputs.has_proj == 'false'
        run: |
          echo "No .sln/.csproj detected — listing repo files for debugging"
          git ls-files | sed -n '1,200p'

      - name: Set up projects for analysis
        if: steps.detect.outputs.has_proj == 'true'
        uses: security-code-scan/security-code-scan-add-action@f8ff4f2763ed6f229eded80b1f9af82ae7f32a0d

      - name: Restore dependencies
        if: steps.detect.outputs.has_proj == 'true'
        run: dotnet restore

      - name: Build
        if: steps.detect.outputs.has_proj == 'true'
        run: dotnet build --no-restore

      - name: Convert sarif for uploading to GitHub
        if: steps.detect.outputs.has_proj == 'true'
        uses: security-code-scan/security-code-scan-results-action@cdb3d5e639054395e45bf401cba8688fcaf7a687

      - name: Upload sarif
        if: steps.detect.outputs.has_proj == 'true'
        uses: github/codeql-action/upload-sarif@v3
